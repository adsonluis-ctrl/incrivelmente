<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Agendamentos — Incrivelmente</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0C1220; --paper:#FFFFFF; --paper-alt:#F5F6F7;
    --blue:#1596CE; --blue-deep:#0D7AAE; --blue-bright:#3FCCF5; --blue-tint:#E7F5FB;
    --line:#E4E7EA; --ink-soft:#545C6B; --ink-faint:#8A92A0;
    --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--font-body); background:var(--paper); color:var(--ink); line-height:1.5; }
  h1,h2{ font-family:var(--font-display); margin:0; }
  .mono{ font-family:var(--font-mono); }

  /* ---- Login screen ---- */
  .login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--paper); padding:24px;
  }
  .login-card{
    background:#fff; border:1px solid var(--line); border-radius:20px;
    padding:40px; width:100%; max-width:380px; color:var(--ink);
    box-shadow:0 20px 46px rgba(12,18,32,.08);
  }
  .login-card h1{ font-size:1.4rem; color:var(--ink); margin-bottom:6px; }
  .login-card p{ color:var(--ink-faint); font-size:.88rem; margin:0 0 24px; }
  .login-card label{ display:block; font-size:.8rem; font-weight:600; margin-bottom:6px; color:var(--ink); }
  .login-card input{
    width:100%; padding:12px 14px; border-radius:9px; border:1px solid var(--line);
    background:var(--paper-alt); color:var(--ink); font-size:.95rem; margin-bottom:16px;
  }
  .login-card input:focus{ outline:none; border-color:var(--blue); }
  .login-card button{
    width:100%; padding:13px; border-radius:999px; border:none; background:var(--blue);
    color:#fff; font-weight:700; font-size:.95rem; cursor:pointer;
  }
  .login-card button:hover{ background:var(--blue-deep); }
  .login-error{ color:#C4322F; font-size:.85rem; margin-top:14px; min-height:1.2em; }

  /* ---- Dashboard ---- */
  .app{ display:none; min-height:100vh; background:var(--paper); }
  .app.is-visible{ display:block; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:20px 32px;
    background:#fff; color:var(--ink); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--line);
  }
  .topbar h1{ font-size:1.1rem; color:var(--ink); }
  .topbar .who{ font-family:var(--font-mono); font-size:.78rem; color:var(--ink-faint); }
  .logout-btn{
    background:transparent; border:1px solid var(--line); color:var(--ink);
    padding:9px 18px; border-radius:999px; font-size:.85rem; cursor:pointer;
  }
  .logout-btn:hover{ background:var(--paper-alt); }

  main{ max-width:1180px; margin:0 auto; padding:32px; }

  .stats{ display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
  .stat{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 22px; min-width:140px; }
  .stat .num{ font-family:var(--font-display); font-size:1.7rem; font-weight:700; }
  .stat .label{ font-family:var(--font-mono); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); }

  .filters{ display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filters button{
    font-family:var(--font-mono); font-size:.75rem; text-transform:uppercase; letter-spacing:.05em;
    padding:9px 16px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink-soft); cursor:pointer;
  }
  .filters button.is-active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .table-wrap{ background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-size:.88rem; }
  thead th{
    text-align:left; font-family:var(--font-mono); font-size:.68rem; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-faint); padding:14px 16px; border-bottom:1px solid var(--line); background:var(--paper-alt);
  }
  tbody td{ padding:14px 16px; border-bottom:1px solid var(--line); vertical-align:top; }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:var(--paper-alt); }
  .msg-cell{ max-width:220px; color:var(--ink-soft); font-size:.84rem; }

  .badge{ font-family:var(--font-mono); font-size:.7rem; padding:5px 11px; border-radius:999px; text-transform:uppercase; letter-spacing:.04em; display:inline-block; }
  .badge-pendente{ background:#FFF3D6; color:#8A6100; }
  .badge-confirmado{ background:#D9F3E2; color:#1B7A45; }
  .badge-cancelado{ background:#FBDCDC; color:#A32323; }

  .row-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .row-actions button{
    font-size:.76rem; padding:7px 12px; border-radius:8px; border:1px solid var(--line); background:#fff; cursor:pointer;
  }
  .row-actions .confirm{ color:#1B7A45; border-color:#B9E7C9; }
  .row-actions .cancel{ color:#A32323; border-color:#F3C2C2; }
  .row-actions .delete{ color:var(--ink-faint); }
  .row-actions button:hover{ filter:brightness(.96); }

  .empty-state{ padding:60px 20px; text-align:center; color:var(--ink-faint); }
  .realtime-dot{ width:8px; height:8px; border-radius:50%; background:#3FCCF5; display:inline-block; margin-right:6px; animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4; } 50%{ opacity:1; } }

  @media (max-width:820px){
    main{ padding:20px; }
    .table-wrap{ overflow-x:auto; }
    table{ min-width:820px; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Painel de Agendamentos</h1>
    <p>Incrivelmente — acesso restrito à equipe.</p>
    <form id="loginForm">
      <label>E-mail</label>
      <input type="email" id="loginEmail" required autocomplete="username">
      <label>Senha</label>
      <input type="password" id="loginPassword" required autocomplete="current-password">
      <button type="submit">Entrar</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app">
  <div class="topbar">
    <h1>Incrivelmente · Agendamentos</h1>
    <div style="display:flex; align-items:center; gap:18px;">
      <span class="who mono"><span class="realtime-dot"></span>ao vivo · <span id="whoEmail"></span></span>
      <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
  </div>

  <main>
    <div class="stats">
      <div class="stat"><div class="num" id="statPendente">0</div><div class="label">Pendentes</div></div>
      <div class="stat"><div class="num" id="statConfirmado">0</div><div class="label">Confirmados</div></div>
      <div class="stat"><div class="num" id="statCancelado">0</div><div class="label">Cancelados</div></div>
      <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
    </div>

    <div class="filters" id="filters">
      <button data-filter="todos" class="is-active">Todos</button>
      <button data-filter="pendente">Pendentes</button>
      <button data-filter="confirmado">Confirmados</button>
      <button data-filter="cancelado">Cancelados</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Paciente</th>
            <th>Contato</th>
            <th>Especialidade</th>
            <th>Quando</th>
            <th>Mensagem</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">Nenhum agendamento por aqui ainda.</div>
    </div>
  </main>
</div>

<script>
// ============================================================
// Substitua pelos valores do seu projeto:
// Supabase → Project Settings → API
// ============================================================
const SUPABASE_URL = "https://djjangisxororttjqsjl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_tBzEI4QPC5P1yk2-b4cxJw_KyzczscV";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginScreen = document.getElementById("loginScreen");
const appEl = document.getElementById("app");
const loginForm = document.getElementById("loginForm");
const loginError = document.getElementById("loginError");
const whoEmail = document.getElementById("whoEmail");

let allRows = [];
let currentFilter = "todos";

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  loginError.textContent = "";
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    loginError.textContent = "E-mail ou senha incorretos.";
    return;
  }
  showApp();
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await sb.auth.signOut();
  location.reload();
});

async function showApp() {
  const { data } = await sb.auth.getSession();
  if (!data.session) return;
  whoEmail.textContent = data.session.user.email;
  loginScreen.style.display = "none";
  appEl.classList.add("is-visible");
  await loadAppointments();
  subscribeRealtime();
}

async function loadAppointments() {
  const { data, error } = await sb
    .from("agendamentos")
    .select("*")
    .order("data", { ascending: true })
    .order("hora", { ascending: true });
  if (error) {
    console.error(error);
    return;
  }
  allRows = data || [];
  render();
}

function subscribeRealtime() {
  sb.channel("agendamentos-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "agendamentos" }, () => {
      loadAppointments();
    })
    .subscribe();
}

document.getElementById("filters").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-filter]");
  if (!btn) return;
  document.querySelectorAll("#filters button").forEach((b) => b.classList.remove("is-active"));
  btn.classList.add("is-active");
  currentFilter = btn.getAttribute("data-filter");
  render();
});

function formatDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return day + "/" + m + "/" + y;
}

function render() {
  const rows = currentFilter === "todos" ? allRows : allRows.filter((r) => r.status === currentFilter);

  document.getElementById("statTotal").textContent = allRows.length;
  document.getElementById("statPendente").textContent = allRows.filter((r) => r.status === "pendente").length;
  document.getElementById("statConfirmado").textContent = allRows.filter((r) => r.status === "confirmado").length;
  document.getElementById("statCancelado").textContent = allRows.filter((r) => r.status === "cancelado").length;

  const tbody = document.getElementById("tableBody");
  const emptyState = document.getElementById("emptyState");
  tbody.innerHTML = "";

  if (rows.length === 0) {
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  rows.forEach((r) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${escapeHtml(r.nome)}</strong></td>
      <td>${escapeHtml(r.telefone)}${r.email ? "<br><span style='color:var(--ink-faint);font-size:.82rem;'>" + escapeHtml(r.email) + "</span>" : ""}</td>
      <td>${escapeHtml(r.especialidade || "—")}</td>
      <td>${formatDate(r.data)}<br>${(r.hora || "").slice(0,5)}</td>
      <td class="msg-cell">${r.mensagem ? escapeHtml(r.mensagem) : "<span style='color:var(--ink-faint)'>—</span>"}</td>
      <td><span class="badge badge-${r.status}">${r.status}</span></td>
      <td>
        <div class="row-actions">
          ${r.status !== "confirmado" ? `<button class="confirm" data-id="${r.id}" data-action="confirmado">Confirmar</button>` : ""}
          ${r.status !== "cancelado" ? `<button class="cancel" data-id="${r.id}" data-action="cancelado">Cancelar</button>` : ""}
          <button class="delete" data-id="${r.id}" data-action="delete">Excluir</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

document.getElementById("tableBody").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;
  const id = btn.getAttribute("data-id");
  const action = btn.getAttribute("data-action");

  if (action === "delete") {
    if (!confirm("Excluir este agendamento definitivamente?")) return;
    await sb.from("agendamentos").delete().eq("id", id);
  } else {
    await sb.from("agendamentos").update({ status: action }).eq("id", id);
  }
  await loadAppointments();
});

// Se já existir uma sessão válida (login anterior), entra direto
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session) showApp();
})();
</script>
</body>
</html>
